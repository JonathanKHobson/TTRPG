<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Herbs Data Pack</title>
  <!--
    Herbs Data Pack (HTML)
    ---------------------------------------------
    Load elsewhere (same-origin):
      fetch('herbs.html').then(r => r.text()).then(html => {
        const doc = new DOMParser().parseFromString(html, 'text/html');
        const json = JSON.parse(doc.querySelector('#herbs-data').textContent);
        console.log(json.items);
      });

    Global helpers available in-page:
      window.HerbsDataPack = {
        version, items,
        getAll(), byEnv(env), byRarity(rarity), find(q),
        random({ env, d20 }?)  // if d20 omitted, one is rolled
      }

    Rarity mapping (derived from roll range):
      1–5: Common   | 6–10: Uncommon | 11–15: Rare | 16–20: Very Rare
  -->
  <style>
    :root{
      --paper-0:#fbf6e9; --paper-1:#f3ead4; --paper-2:#e6d7bb;
      --ink:#111; --ink-soft:rgba(0,0,0,.65); --ink-red:#7a1f1f;
      --ring:#d9c9a7; --ring-2:#d7c6a1;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;color:var(--ink);
      font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Apple Color Emoji","Segoe UI Emoji";
      background:
        radial-gradient(rgba(0,0,0,.035) .8px, transparent .8px),
        radial-gradient(1200px 800px at 50% 0%, #f8f1de 0%, #f0e6cf 60%, var(--paper-2) 100%);
      background-size:6px 6px, auto;
      background-blend-mode:multiply;
      -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
    }
    .container{max-width:1100px;margin:0 auto;padding:40px 16px 84px}
    .paper{background:linear-gradient(180deg, rgba(255,255,255,.60), rgba(255,255,255,.52));backdrop-filter:blur(.3px)}
    .round{border-radius:16px}
    .shadow{box-shadow:0 10px 30px rgba(0,0,0,.10)}
    .ring{border:1px solid var(--ring)}

    header.card{position:relative;overflow:hidden}
    header.card .burn:before, header.card .burn:after{
      content:"";position:absolute;border-radius:999px;filter:blur(28px);opacity:.12;mix-blend-mode:multiply;pointer-events:none
    }
    header.card .burn:before{width:120px;height:120px;background:var(--ink-red);left:-32px;top:-32px;transform:rotate(12deg)}
    header.card .burn:after{width:140px;height:140px;background:var(--ink-red);right:-40px;bottom:-48px;transform:rotate(-12deg)}

    h1{margin:0;font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;font-weight:700;color:var(--ink-red)}
    .sub{color:var(--ink-soft)}
    .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:14px}
    .input,.select{padding:10px 12px;border:1px solid var(--ring-2);border-radius:12px;background:color-mix(in oklab, var(--paper-0) 70%, white 30%);outline:0}
    .btn{border:1px solid var(--ring-2);background:linear-gradient(180deg, var(--paper-0), var(--paper-1));padding:10px 12px;border-radius:12px;cursor:pointer}
    .btn:hover{filter:brightness(1.02)}
    .count{font-size:12px;color:var(--ink-soft);margin-left:auto}
    .check{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-soft)}

    .table-wrap{margin-top:16px;overflow:auto}
    table{width:100%;border-collapse:separate;border-spacing:0;background:linear-gradient(180deg, var(--paper-0), var(--paper-1));border:1px solid var(--ring);border-radius:16px;overflow:hidden}
    thead th{position:sticky;top:0;background:color-mix(in oklab, var(--paper-0) 70%, white 30%);text-align:left;padding:10px 12px;font-size:13px;color:var(--ink-soft);border-bottom:1px solid var(--ring)}
    tbody td{padding:10px 12px;border-bottom:1px solid rgba(0,0,0,.05)}
    tbody tr:hover{background:rgba(0,0,0,.035)}
    th.sortable{cursor:pointer}
    th.sortable::after{content:" ↕";opacity:.5}
    th.sortable[data-dir="asc"]::after{content:" ↑"}
    th.sortable[data-dir="desc"]::after{content:" ↓"}

    .badge{display:inline-block;border:1px solid var(--ring-2);border-radius:999px;padding:4px 8px;font:700 10px/1 system-ui;text-transform:uppercase;letter-spacing:.04em;background:#f3ead4;color:color-mix(in oklab, var(--ink-red) 90%, black 10%)}
    .env{font-weight:600}
    .muted{color:var(--ink-soft);font-size:14px}

    .foot{margin-top:16px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .small{font-size:12px;color:var(--ink-soft)}
    .hidden{display:none!important}

    .roll-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:8px}
    .roll-out{font-weight:700}
  </style>
</head>
<body>
  <div class="container">
    <header class="card paper round shadow ring">
      <div class="burn" aria-hidden="true"></div>
      <div style="padding:24px">
        <h1 style="font-size:clamp(28px,3vw,38px)">Herbs Data Pack</h1>
        <p class="sub" style="margin:.25rem 0 0">
          Roll-table entries by environment. Lists go from <em>Common</em> to <em>Very Rare</em> (based on roll ranges).
        </p>

        <div class="controls">
          <input id="q" class="input" type="search" placeholder="Search name or tag…" aria-label="Search" />
          <select id="env" class="select" aria-label="Filter by environment">
            <option value="">All environments</option>
            <option>Forest/Woodlands</option>
            <option>Tropical/Jungle</option>
            <option>Mountains/Steppes</option>
            <option>Cave/Subterranean</option>
            <option>Water/Coastal</option>
            <option>Swamps/Wetlands</option>
            <option>Plains/Hills</option>
            <option>Arid/Deserts</option>
            <option>Tundra/Arctic</option>
            <option>Wasteland/Corruptland</option>
            <option>Ethereal Limbo</option>
            <option>Astral Window</option>
            <option>Fey Plane</option>
            <option>UnderDark</option>
          </select>
          <select id="rarity" class="select" aria-label="Filter by rarity">
            <option value="">All rarity</option>
            <option>Common</option>
            <option>Uncommon</option>
            <option>Rare</option>
            <option>Very Rare</option>
          </select>
          <label class="check"><input id="daggerOnly" type="checkbox" /> Show † only</label>
          <button id="reset" class="btn" type="button">Reset</button>
          <button id="export" class="btn" type="button" title="Download herbs.json">Export JSON</button>
          <span id="count" class="count" aria-live="polite"></span>
        </div>

        <div class="roll-bar">
          <select id="rollEnv" class="select" aria-label="Roll environment">
            <option value="">Choose environment for 1d20 roll…</option>
            <option>Forest/Woodlands</option>
            <option>Tropical/Jungle</option>
            <option>Mountains/Steppes</option>
            <option>Cave/Subterranean</option>
            <option>Water/Coastal</option>
            <option>Swamps/Wetlands</option>
            <option>Plains/Hills</option>
            <option>Arid/Deserts</option>
            <option>Tundra/Arctic</option>
            <option>Wasteland/Corruptland</option>
            <option>Ethereal Limbo</option>
            <option>Astral Window</option>
            <option>Fey Plane</option>
            <option>UnderDark</option>
          </select>
          <button id="rollBtn" class="btn" type="button">Roll 1d20</button>
          <span id="rollOut" class="roll-out"></span>
        </div>
      </div>
    </header>

    <main class="table-wrap">
      <table aria-describedby="count">
        <thead>
          <tr>
            <th class="sortable" data-key="environment">Environment</th>
            <th class="sortable" data-key="range" style="width:110px">Roll</th>
            <th class="sortable" data-key="name">Name</th>
            <th class="sortable" data-key="rarity" style="width:120px">Rarity</th>
            <th>Tags</th>
            <th class="sortable" data-key="dagger" style="width:70px">†</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>

      <p id="empty" class="muted hidden" style="padding:14px">No results match that filter.</p>

      <div class="foot">
        <span class="small">Source: Heron’s Manual – Volume 1: Pursuing Activities (user-provided).</span>
        <span class="small">Version: <code>1.0.0</code></span>
      </div>
    </main>
  </div>

  <script>
    (function initPack(){
      const raw = document.getElementById('herbs-data').textContent.trim();
      /** @type {{items:any[], annams_finger_roll:any[], version:string}} */
      const data = JSON.parse(raw);

      // Derive rarity & tags
      data.items.forEach(it => {
        // rarity
        const min = +it.rollMin, max = +it.rollMax;
        const bucket = (min >= 1 && max <= 5) ? 'Common'
                    : (min >= 6 && max <= 10) ? 'Uncommon'
                    : (min >= 11 && max <= 15) ? 'Rare'
                    : 'Very Rare';
        it.rarity = bucket;

        // tags from name
        const tags = new Set();
        const n = (it.name || '').toLowerCase();
        function add(t){ if(t) tags.add(t); }
        if (/\bseaweed\b/.test(n)) add('seaweed');
        if (/\bfungus\b|fungi\b|mold\b|mushroom\b/.test(n)) add('fungus');
        if (/\blichen\b/.test(n)) add('lichen');
        if (/\bmoss\b/.test(n)) add('moss');
        if (/\bberry\b|berries\b/.test(n)) add('berry');
        if (/\bbloom\b/.test(n)) add('bloom');
        if (/\bflower\b/.test(n)) add('flower');
        if (/\brose\b/.test(n)) add('flower');
        if (/\bpoppy\b/.test(n)) add('flower');
        if (/\bpetal\b|petals\b/.test(n)) add('petal');
        if (/\bvine\b/.test(n)) add('vine');
        if (/\broot\b/.test(n)) add('root');
        if (/\bjuice\b|paste\b|mud\b/.test(n)) add('extract');
        if (/\bseed\b|seeds\b/.test(n)) add('seed');
        if (/\bwood\b|tree\b/.test(n)) add('woody');
        if (/\bcacti\b|cactus\b|thorn\b|needle\b/.test(n)) add('spined');
        if (/\bkelpie\b|waterorbs\b|chromatic mud\b/.test(n)) add('aquatic');
        // environment hints
        if (/coastal|water/.test((it.environment||'').toLowerCase())) add('aquatic');
        it.tags = Array.from(tags);
      });

      // Expose helpers
      window.HerbsDataPack = {
        version: data.version || '1.0.0',
        items: data.items.slice(),
        annams_finger_roll: data.annams_finger_roll,
        getAll(){ return data.items.slice(); },
        byEnv(env){ return data.items.filter(x => x.environment === env); },
        byRarity(r){ return data.items.filter(x => x.rarity === r); },
        find(q){
          const needle = (q||'').trim().toLowerCase();
          return data.items.filter(x =>
            x.name.toLowerCase().includes(needle) ||
            (x.tags||[]).some(t => t.includes(needle))
          );
        },
        random(opts={}){
          const env = opts.env;
          let d20 = opts.d20 ?? (1 + Math.floor(Math.random() * 20));
          let pool = env ? data.items.filter(x => x.environment === env) : data.items;
          // choose those whose range includes the roll
          const hits = pool.filter(x => d20 >= x.rollMin && d20 <= x.rollMax);
          if (hits.length) return { roll: d20, pick: hits[0] };
          // fallback: nearest by distance to range
          const scored = pool.map(x => {
            const dist = (d20 < x.rollMin) ? (x.rollMin - d20) : (d20 > x.rollMax ? (d20 - x.rollMax) : 0);
            return { x, dist };
          }).sort((a,b)=>a.dist-b.dist);
          return { roll: d20, pick: scored[0]?.x || null };
        }
      };

      // Viewer wiring
      const rows = document.getElementById('rows');
      const qEl   = document.getElementById('q');
      const envEl = document.getElementById('env');
      const rarityEl = document.getElementById('rarity');
      const daggerOnlyEl = document.getElementById('daggerOnly');
      const count = document.getElementById('count');
      const empty = document.getElementById('empty');
      const reset = document.getElementById('reset');
      const exportBtn = document.getElementById('export');
      const ths = Array.from(document.querySelectorAll('th.sortable'));

      const rollEnv = document.getElementById('rollEnv');
      const rollBtn = document.getElementById('rollBtn');
      const rollOut = document.getElementById('rollOut');

      let view = data.items.slice();
      let sortKey = 'environment';
      let sortDir = 'asc';

      function applyFilters(){
        const q = (qEl.value||'').trim().toLowerCase();
        const env = envEl.value;
        const rarity = rarityEl.value;
        const daggerOnly = daggerOnlyEl.checked;

        view = data.items.filter(it => {
          if (env && it.environment !== env) return false;
          if (rarity && it.rarity !== rarity) return false;
          if (daggerOnly && !it.dagger) return false;
          if (q){
            const hay = [it.name, ...(it.tags||[])].join(' ').toLowerCase();
            if (!hay.includes(q)) return false;
          }
          return true;
        });
        applySort(); render();
      }

      function applySort(){
        const dir = sortDir === 'asc' ? 1 : -1;
        view.sort((a,b) => {
          let av = a[sortKey], bv = b[sortKey];
          // custom rarity order
          const ro = { 'Common':1, 'Uncommon':2, 'Rare':3, 'Very Rare':4 };
          if (sortKey === 'rarity'){ av = ro[av] || 99; bv = ro[bv] || 99; }
          if (sortKey === 'range'){
            const ap = a.rollMin, bp = b.rollMin; return (ap - bp) * dir;
          }
          if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * dir;
          return String(av).localeCompare(String(bv)) * dir;
        });
      }

      function render(){
        rows.innerHTML = '';
        view.forEach(it => {
          const tr = document.createElement('tr');
          const tags = (it.tags||[]).map(t => `<span class="badge" style="margin-right:6px">${t}</span>`).join(' ');
          tr.innerHTML = `
            <td><span class="env">${it.environment}</span></td>
            <td>${it.range}</td>
            <td>${it.name}</td>
            <td><span class="badge">${it.rarity}</span></td>
            <td>${tags}</td>
            <td>${it.dagger ? '†' : ''}</td>
          `;
          rows.appendChild(tr);
        });
        empty.classList.toggle('hidden', view.length !== 0);
        count.textContent = `${view.length}/${data.items.length}`;
      }

      function setSort(key){
        if (sortKey === key){
          sortDir = (sortDir === 'asc') ? 'desc' : 'asc';
        } else {
          sortKey = key; sortDir = 'asc';
        }
        ths.forEach(th => th.removeAttribute('data-dir'));
        const active = ths.find(th => th.dataset.key === sortKey);
        if (active) active.dataset.dir = sortDir;
        applySort(); render();
      }

      // Events
      qEl.addEventListener('input', applyFilters);
      envEl.addEventListener('change', applyFilters);
      rarityEl.addEventListener('change', applyFilters);
      daggerOnlyEl.addEventListener('change', applyFilters);
      reset.addEventListener('click', () => {
        qEl.value = ''; envEl.value = ''; rarityEl.value = ''; daggerOnlyEl.checked = false;
        sortKey = 'environment'; sortDir = 'asc';
        ths.forEach(th => th.removeAttribute('data-dir'));
        applyFilters();
      });
      ths.forEach(th => th.addEventListener('click', () => setSort(th.dataset.key)));

      exportBtn.addEventListener('click', () => {
        const payload = { pack: 'herbs', version: data.version || '1.0.0', annams_finger_roll: data.annams_finger_roll, items: data.items };
        const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'herbs.json';
        document.body.appendChild(a); a.click();
        URL.revokeObjectURL(url); a.remove();
      });

      // Dice roller
      rollBtn.addEventListener('click', () => {
        const env = rollEnv.value;
        if (!env){ rollOut.textContent = 'Choose an environment first.'; return; }
        const res = window.HerbsDataPack.random({ env });
        if (!res?.pick){ rollOut.textContent = 'No result.'; return; }
        let extra = '';
        if (res.pick.name === "Annam's Finger"){
          const table = window.HerbsDataPack.annams_finger_roll;
          extra = ` | † Annam's Finger d6: ${table.map(r=>`${r.roll} ${r.color} (${r.giant})`).join(' · ')}`;
        }
        rollOut.textContent = `Rolled ${res.roll}: ${res.pick.name} [${res.pick.range}, ${res.pick.rarity}]${extra}`;
      });

      // Init
      setSort('environment');
      applyFilters();
    })();
  </script>
