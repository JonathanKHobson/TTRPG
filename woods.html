<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Woods Data Pack</title>
  <!--
    Woods Data Pack (HTML)
    ---------------------------------------------
    Usage (from another page on the same origin):
    1) fetch('woods.html')
       .then(r => r.text())
       .then(html => {
         const doc = new DOMParser().parseFromString(html, 'text/html');
         const json = JSON.parse(doc.querySelector('#woods-data').textContent);
         console.log(json.items); // your woods data
       });

    Or, if you <iframe src="woods.html"> and need the data, you can read
    iframe.contentWindow.WoodsDataPack.getAll() once it loads (same-origin).

    Global helpers exposed here:
      window.WoodsDataPack = {
        version: '1.0.0',
        items: [...],
        getAll(): items[],
        byEnv(env: 'Temperate'|'Tropical'|'Boreal'): items[],
        findByName(name: string): items[],
        random(filter?: { env?: string, tier?: string }): item | null
      }

    Notes:
    - "index" is preserved exactly as provided (gaps may exist).
    - "uid" is unique per-record (env + index + slug).
    - "dcTier" is derived for convenience:
        Easy (≤14), Moderate (15–19), Hard (20–24), Very Hard (25–29), Extreme (≥30)
  -->
  <style>
    :root{
      --paper-0:#fbf6e9; --paper-1:#f3ead4; --paper-2:#e6d7bb;
      --ink:#111; --ink-soft:rgba(0,0,0,.65); --ink-red:#7a1f1f;
      --ring:#d9c9a7; --ring-2:#d7c6a1;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;color:var(--ink);
      font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Apple Color Emoji","Segoe UI Emoji";
      background:
        radial-gradient(rgba(0,0,0,0.035) .8px, transparent .8px),
        radial-gradient(1200px 800px at 50% 0%, #f8f1de 0%, #f0e6cf 60%, var(--paper-2) 100%);
      background-size:6px 6px, auto;
      background-blend-mode:multiply;
      -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
    }
    .container{max-width:1100px;margin:0 auto;padding:40px 16px 72px}
    .paper{background:linear-gradient(180deg, rgba(255,255,255,.60), rgba(255,255,255,.52));backdrop-filter:blur(.3px)}
    .round{border-radius:16px}
    .shadow{box-shadow:0 10px 30px rgba(0,0,0,.10)}
    .ring{border:1px solid var(--ring)}

    header.card{position:relative;overflow:hidden}
    header.card .burn:before, header.card .burn:after{
      content:"";position:absolute;border-radius:999px;filter:blur(28px);opacity:.12;mix-blend-mode:multiply;pointer-events:none
    }
    header.card .burn:before{width:120px;height:120px;background:var(--ink-red);left:-32px;top:-32px;transform:rotate(12deg)}
    header.card .burn:after{width:140px;height:140px;background:var(--ink-red);right:-40px;bottom:-48px;transform:rotate(-12deg)}

    h1{margin:0;font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;font-weight:700;color:var(--ink-red)}
    .sub{color:var(--ink-soft)}
    .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:14px}
    .input,.select{padding:10px 12px;border:1px solid var(--ring-2);border-radius:12px;background:color-mix(in oklab, var(--paper-0) 70%, white 30%);outline:0}
    .btn{border:1px solid var(--ring-2);background:linear-gradient(180deg, var(--paper-0), var(--paper-1));padding:10px 12px;border-radius:12px;cursor:pointer}
    .btn:hover{filter:brightness(1.02)}
    .count{font-size:12px;color:var(--ink-soft);margin-left:auto}

    .table-wrap{margin-top:16px;overflow:auto}
    table{width:100%;border-collapse:separate;border-spacing:0;background:linear-gradient(180deg, var(--paper-0), var(--paper-1));border:1px solid var(--ring);border-radius:16px;overflow:hidden}
    thead th{position:sticky;top:0;background:color-mix(in oklab, var(--paper-0) 70%, white 30%);text-align:left;padding:10px 12px;font-size:13px;color:var(--ink-soft);border-bottom:1px solid var(--ring)}
    tbody td{padding:10px 12px;border-bottom:1px solid rgba(0,0,0,.05)}
    tbody tr:hover{background:rgba(0,0,0,.035)}
    th.sortable{cursor:pointer}
    th.sortable::after{content:" ↕";opacity:.5}
    th.sortable[data-dir="asc"]::after{content:" ↑"}
    th.sortable[data-dir="desc"]::after{content:" ↓"}

    .badge{display:inline-block;border:1px solid var(--ring-2);border-radius:999px;padding:4px 8px;font:700 10px/1 system-ui;text-transform:uppercase;letter-spacing:.04em;background:#f3ead4;color:color-mix(in oklab, var(--ink-red) 90%, black 10%)}
    .env{font-weight:600}
    .muted{color:var(--ink-soft);font-size:14px}

    .foot{margin-top:16px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .small{font-size:12px;color:var(--ink-soft)}
    .hidden{display:none!important}
  </style>
</head>
<body>
  <div class="container">
    <header class="card paper round shadow ring">
      <div class="burn" aria-hidden="true"></div>
      <div style="padding:24px">
        <h1 style="font-size:clamp(28px,3vw,38px)">Woods Data Pack</h1>
        <p class="sub" style="margin:.25rem 0 0">Environment → Wood → Chopping DC (with computed DC Tiers). All values mirror your provided list.</p>

        <div class="controls">
          <input id="q" class="input" type="search" placeholder="Search name…" aria-label="Search by wood name" />
          <select id="env" class="select" aria-label="Filter by environment">
            <option value="">All environments</option>
            <option value="Temperate">Temperate</option>
            <option value="Tropical">Tropical</option>
            <option value="Boreal">Boreal</option>
          </select>
          <select id="tier" class="select" aria-label="Filter by DC tier">
            <option value="">All DC tiers</option>
            <option>Easy (≤14)</option>
            <option>Moderate (15–19)</option>
            <option>Hard (20–24)</option>
            <option>Very Hard (25–29)</option>
            <option>Extreme (≥30)</option>
          </select>
          <button id="reset" class="btn" type="button">Reset</button>
          <button id="export" class="btn" type="button" title="Download woods.json">Export JSON</button>
          <span id="count" class="count" aria-live="polite"></span>
        </div>
      </div>
    </header>

    <main class="table-wrap">
      <table aria-describedby="count">
        <thead>
          <tr>
            <th class="sortable" data-key="environment">Environment</th>
            <th class="sortable" data-key="index" style="width:90px">Index</th>
            <th class="sortable" data-key="name">Wood</th>
            <th class="sortable" data-key="dc" style="width:130px">Chopping DC</th>
            <th class="sortable" data-key="dcTier" style="width:160px">DC Tier</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>

      <p id="empty" class="muted hidden" style="padding:14px">No results match that filter.</p>

      <div class="foot">
        <span class="small">Source: Heron’s Manual – Volume 1: Pursuing Activities (user-provided).</span>
        <span class="small">Version: <code>1.0.0</code></span>
      </div>
    </main>
  </div>

  <script>
    (function initPack(){
      const raw = document.getElementById('woods-data').textContent.trim();
      /** @type {{items:any[]}} */
      const data = JSON.parse(raw);

      // compute dcTier & attach
      data.items.forEach(it => {
        it.dcTier = dcToTier(it.dc);
      });

      function dcToTier(dc){
        if (dc <= 14) return 'Easy (≤14)';
        if (dc <= 19) return 'Moderate (15–19)';
        if (dc <= 24) return 'Hard (20–24)';
        if (dc <= 29) return 'Very Hard (25–29)';
        return 'Extreme (≥30)';
      }

      // Expose helpers
      window.WoodsDataPack = {
        version: data.version || '1.0.0',
        items: data.items.slice(),
        getAll(){ return data.items.slice(); },
        byEnv(env){ return data.items.filter(x => x.environment === env); },
        findByName(name){
          const n = (name||'').trim().toLowerCase();
          return data.items.filter(x => x.name.toLowerCase().includes(n));
        },
        random(filter){
          let pool = data.items;
          if (filter?.env) pool = pool.filter(x => x.environment === filter.env);
          if (filter?.tier) pool = pool.filter(x => x.dcTier === filter.tier);
          if (!pool.length) return null;
          return pool[Math.floor(Math.random() * pool.length)];
        }
      };

      // --- minimal viewer ---
      const rows = document.getElementById('rows');
      const qEl   = document.getElementById('q');
      const envEl = document.getElementById('env');
      const tierEl= document.getElementById('tier');
      const count = document.getElementById('count');
      const empty = document.getElementById('empty');
      const reset = document.getElementById('reset');
      const exportBtn = document.getElementById('export');
      const ths = Array.from(document.querySelectorAll('th.sortable'));

      let view = data.items.slice();
      let sortKey = 'environment';
      let sortDir = 'asc';

      function applyFilters(){
        const q = (qEl.value||'').trim().toLowerCase();
        const env = envEl.value;
        const tier = tierEl.value;

        view = data.items.filter(it => {
          if (env && it.environment !== env) return false;
          if (tier && it.dcTier !== tier) return false;
          if (q && !it.name.toLowerCase().includes(q)) return false;
          return true;
        });
        applySort();
        render();
      }

      function applySort(){
        const dir = sortDir === 'asc' ? 1 : -1;
        view.sort((a,b) => {
          const av = a[sortKey], bv = b[sortKey];
          if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * dir;
          return String(av).localeCompare(String(bv)) * dir;
        });
      }

      function render(){
        rows.innerHTML = '';
        view.forEach(it => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><span class="env">${it.environment}</span></td>
            <td>${it.index ?? ''}</td>
            <td>${it.name}</td>
            <td>${it.dc}</td>
            <td><span class="badge">${it.dcTier}</span></td>
          `;
          rows.appendChild(tr);
        });
        empty.classList.toggle('hidden', view.length !== 0);
        count.textContent = `${view.length}/${data.items.length}`;
      }

      function setSort(key){
        if (sortKey === key){
          sortDir = (sortDir === 'asc') ? 'desc' : 'asc';
        } else {
          sortKey = key; sortDir = 'asc';
        }
        ths.forEach(th => th.removeAttribute('data-dir'));
        const active = ths.find(th => th.dataset.key === sortKey);
        if (active) active.dataset.dir = sortDir;
        applySort(); render();
      }

      // events
      qEl.addEventListener('input', applyFilters);
      envEl.addEventListener('change', applyFilters);
      tierEl.addEventListener('change', applyFilters);
      reset.addEventListener('click', () => {
        qEl.value = ''; envEl.value = ''; tierEl.value = '';
        sortKey = 'environment'; sortDir = 'asc';
        ths.forEach(th => th.removeAttribute('data-dir'));
        applyFilters();
      });
      ths.forEach(th => th.addEventListener('click', () => setSort(th.dataset.key)));

      exportBtn.addEventListener('click', () => {
        const payload = {
          pack: 'woods',
          version: data.version || '1.0.0',
          items: data.items
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'woods.json';
        document.body.appendChild(a);
        a.click();
        URL.revokeObjectURL(url);
        a.remove();
      });

      // initial state
      setSort('environment');
      applyFilters();
    })();
  </script>
</body>
</html>
